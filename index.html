
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportation Images</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #2c3e50;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card-content {
            padding: 15px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Transportation Gallery</h1>
        <p>Sample images of different transportation methods</p>
    </header>

    <div class="gallery">
        <div class="card">
            <img src="static\plane.jpg" alt="Airplane">
            <div class="card-content">
                <h2>Airplane</h2>
                <p>Commercial passenger airplane flying in the sky</p>
            </div>
        </div>

        <div class="card">
            <img src="static\train.jpg" alt="Train">
            <div class="card-content">
                <h2>Train</h2>
                <p>High-speed train moving through the countryside</p>
            </div>
        </div>
    </div>

    <footer>
        <p>Images downloaded from Unsplash | Generated by Python</p>
    </footer>
</body>
</html>
